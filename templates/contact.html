{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-screen bg-gray-950">
  <div class="w-full max-w-lg bg-gray-900 p-8 rounded-2xl shadow-xl">
    <h2 class="text-2xl font-bold text-white text-center mb-6">Contact Us</h2>

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-gray-400 mb-1">Name</label>
        <input type="text" name="name" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white">
      </div>

      <div>
        <label class="block text-gray-400 mb-1">Email</label>
        <input type="email" name="email" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white">
      </div>

      <div>
        <label class="block text-gray-400 mb-1">Message</label>
        <textarea name="message" rows="4" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white"></textarea>
      </div>

      <button type="submit"
        class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
        Send Message
      </button>
    </form>
  </div>
</div>
{% endblock %}
