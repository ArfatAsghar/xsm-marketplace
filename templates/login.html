{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
  <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-xl border border-gray-800">
    <h2 class="text-2xl font-bold text-white text-center mb-6">Login to XSM</h2>

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-gray-400 mb-1">Email</label>
        <input type="email" name="email" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <div>
        <label class="block text-gray-400 mb-1">Password</label>
        <input type="password" name="password" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <button type="submit"
        class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
        Login
      </button>
    </form>

    <div class="flex justify-between text-sm mt-4">
      <a href="/signup" class="text-indigo-400 hover:underline">Sign Up</a>
      <a href="/forgot" class="text-indigo-400 hover:underline">Forgot Password?</a>
    </div>
  </div>
</div>
{% endblock %}
