{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-16 bg-gray-900 p-6 rounded-xl">
  <h2 class="text-xl text-white mb-4">Set New Password</h2>
  <form method="POST" class="space-y-4">
    <input type="password" name="password" placeholder="New Password" required
      class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white">
    <button type="submit" class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg">Reset Password</button>
  </form>
</div>
{% endblock %}
