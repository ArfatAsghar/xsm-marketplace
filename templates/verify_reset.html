{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
  <div class="w-full max-w-md bg-gray-900 p-8 rounded-2xl shadow-xl border border-gray-800">
    <h2 class="text-2xl font-bold text-white text-center mb-6">Verify Reset Code</h2>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mb-4">
          {% for category, message in messages %}
            <div class="px-4 py-2 rounded-lg text-sm
              {% if category == 'success' %}bg-green-600 text-white{% elif category == 'danger' %}bg-red-600 text-white{% else %}bg-gray-700 text-gray-200{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <form method="POST" class="space-y-5">
      <div>
        <label class="block text-gray-400 mb-1">Enter the 6-digit code</label>
        <input type="text" name="code" maxlength="6" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none text-center text-lg tracking-widest">
      </div>

      <button type="submit"
        class="w-full py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg font-semibold">
        Verify Code
      </button>
    </form>

    <p class="text-gray-500 text-sm text-center mt-6">
      Didn’t receive the code?
      <a href="{{ url_for('auth.resend_otp') }}" class="text-indigo-400 hover:underline">Resend OTP</a>
    </p>
  </div>
</div>
{% endblock %}
