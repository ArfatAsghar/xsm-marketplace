{% extends "base.html" %}
{% block content %}
<div class="flex items-center justify-center min-h-[80vh]">
  <div class="w-full max-w-lg bg-gray-900 p-8 rounded-2xl shadow-xl border border-gray-800">
    <h2 class="text-2xl font-bold text-white text-center mb-6">Edit Listing</h2>

    <form method="POST" class="space-y-5">
      <!-- Platform Dropdown -->
      <div>
        <label class="block text-gray-400 mb-1">Platform</label>
        <select name="platform" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none">
          <option value="Facebook" {% if listing.platform == "Facebook" %}selected{% endif %}>Facebook</option>
          <option value="Instagram" {% if listing.platform == "Instagram" %}selected{% endif %}>Instagram</option>
          <option value="Twitter" {% if listing.platform == "Twitter" %}selected{% endif %}>Twitter</option>
          <option value="YouTube" {% if listing.platform == "YouTube" %}selected{% endif %}>YouTube</option>
          <option value="TikTok" {% if listing.platform == "TikTok" %}selected{% endif %}>TikTok</option>
          <option value="Other" {% if listing.platform == "Other" %}selected{% endif %}>Other</option>
        </select>
      </div>

      <!-- Page Name -->
      <div>
        <label class="block text-gray-400 mb-1">Page Name</label>
        <input type="text" name="username" value="{{ listing.username }}" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Page / Profile Link -->
      <div>
        <label class="block text-gray-400 mb-1">Page / Profile Link</label>
        <input type="url" name="page_link" value="{{ listing.page_link or '' }}" placeholder="https://..."
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Followers -->
      <div>
        <label class="block text-gray-400 mb-1">Followers</label>
        <input type="number" name="followers" value="{{ listing.followers }}"
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Price -->
      <div>
        <label class="block text-gray-400 mb-1">Price ($)</label>
        <input type="number" name="price" value="{{ listing.price }}" required
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none">
      </div>

      <!-- Description -->
      <div>
        <label class="block text-gray-400 mb-1">Description</label>
        <textarea name="description" rows="4"
          class="w-full px-4 py-2 rounded-lg bg-gray-800 border border-gray-700 text-white
                 focus:ring-2 focus:ring-indigo-500 outline-none resize-none">{{ listing.description }}</textarea>
      </div>

      <!-- Buttons -->
      <div class="flex justify-between">
        <a href="/dashboard"
          class="px-4 py-2 rounded-lg bg-gray-700 hover:bg-gray-600 text-gray-200 font-medium">
          Cancel
        </a>
        <button type="submit"
          class="px-4 py-2 rounded-lg bg-indigo-600 hover:bg-indigo-700 text-white font-semibold">
          Save Changes
        </button>
      </div>
    </form>
  </div>
</div>
{% endblock %}
